<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog</title>

    <link rel="stylesheet" href="./assets/styles/standard.css" />
    <link rel="stylesheet" href="./assets/styles/variables.css" />
    <link rel="stylesheet" href="./assets/styles/fonts.css" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Navigation -->
    <nav class="nav-bar flex-row-center">
      <img src="assets/icons/logo.svg" alt="Travel Blog Logo" />
      <a href="">Highlights</a>
      <a href="">FAQ</a>
      <a href="">Contact</a>
    </nav>
    <!-- Header Bereich -->

    <header>
      <img src="assets/img/yellow_box.svg" />
      <img
        src="assets/img/header_foto.png"
        alt="Pärchen im Urlaub umgeben von Heißluftballons"
      />
      <h1>Cappadocia</h1>
      <p>
        From sunrise balloons to hidden cave dwellings, every moment feels
        unreal in the best way.
      </p>
      <img
        src="assets/img/turkey_circle.svg"
        alt="Button mit Turkey Cappadocia Beschriftung"
      />
      <img src="assets/img/turkey_flag_circle.svg" />
    </header>

    <!-- Main Bereich -->

    <main>
      <section>
        <div class="div_faq">
          <img src="./assets/icons/live_help.svg" alt="" />
          <h2>FAQ</h2>
        </div>
        <div></div>
      </section>
      <section>
        <div class="div_contact">
          <img src="./assets/icons/person_pin.svg" alt="" />
          <h2>Contact form</h2>
        </div>
      </section>
    </main>

    <!-- Footer Bereich -->

    <footer class="flex-row-center">
      <div class="footer-text-content">
        <div class="copyright-content">
          <img src="assets/icons/copyright.svg" alt="Copyright Icon" />
          <p>Travel Blog 2026</p>
        </div>
        <a href="">Imprint</a>
        <a href="">Cookie Preferences</a>
      </div>
      <div class="social-media-icons">
        <a href=""
          ><img src="assets/icons/tiktok_icon.svg" alt="TikTok Icon"
        /></a>
        <a href=""
          ><img src="assets/icons/youtube_icon.svg" alt="Youtube Icon"
        /></a>
        <a href=""
          ><img src="assets/icons/facebook_icon.svg" alt="Facebook Icon"
        /></a>
        <a href=""
          ><img src="assets/icons/instagram_icon.svg" alt="Instagram Icon"
        /></a>
      </div>
    </footer>
  </body>
</html>
